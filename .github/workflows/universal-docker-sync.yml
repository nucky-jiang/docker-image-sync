name: Universal Docker to HF Sync

on:
  workflow_dispatch:
    inputs:
      # 1. 镜像名
      docker_image:
        description: '1. [必填] 原始 Docker 镜像名 (例: nginx, pytorch/pytorch)'
        required: true

      # 2. 版本标签
      image_tag:
        description: '2. [必填] 镜像 Tag 版本'
        required: true
        default: 'latest'

      # 3. HF 用户名 ( jiangyun007)
      hf_username:
        description: '3. [必填] Hugging Face 用户名'
        required: true
        default: 'jiangyun007'

      # 4. HF 仓库名
      hf_dataset:
        description: '4. [必填] Hugging Face 仓库名 (例: docker-images)'
        required: true
        default: 'docker-images'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Pull and Compress
        run: |
          sudo apt-get update && sudo apt-get install -y zstd
          
          RAW_IMAGE="${{ github.event.inputs.docker_image }}"
          TAG="${{ github.event.inputs.image_tag }}"
          
          # 【安全处理】将原始镜像名中的斜杠 '/' 替换为下划线 '_'
          SAFE_NAME=$(echo $RAW_IMAGE | tr '/' '_')
          
          echo "==== 开始拉取镜像: $RAW_IMAGE:$TAG ===="
          docker pull $RAW_IMAGE:$TAG
          
          echo "==== 开始打包与压缩 ===="
          docker save $RAW_IMAGE:$TAG -o $SAFE_NAME.tar
          zstd -T0 $SAFE_NAME.tar -o $SAFE_NAME.tar.zst
          rm $SAFE_NAME.tar

      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -U "huggingface_hub[cli]"
          
          # 读取传入的变量
          RAW_IMAGE="${{ github.event.inputs.docker_image }}"
          HF_USER="${{ github.event.inputs.hf_username }}"
          HF_DATASET="${{ github.event.inputs.hf_dataset }}"
          
          # 【核心修复】：将用户输入的两部分，拼接成 HF 要求的标准格式
          FULL_REPO="$HF_USER/$HF_DATASET"
          
          SAFE_NAME=$(echo $RAW_IMAGE | tr '/' '_')
          FILENAME="$SAFE_NAME.tar.zst"
          
          # 内部目录直接使用镜像安全名，不再嵌套额外的 docker-images 文件夹
          TARGET_PATH="$SAFE_NAME/$FILENAME"
          
          echo "==== 准备就绪 ===="
          echo "上传至仓库: $FULL_REPO"
          echo "存储路径为: $TARGET_PATH"
          
          # 执行上传
          hf upload $FULL_REPO $FILENAME $TARGET_PATH --repo-type dataset