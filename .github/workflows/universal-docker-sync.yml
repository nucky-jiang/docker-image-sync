name: Universal Docker to HF Sync

on:
  workflow_dispatch:
    inputs:
      # 1. 镜像名：必填
      docker_image:
        description: '1. [必填] 原始 Docker 镜像名 (例: nginx, pytorch/pytorch)'
        required: true

      # 2. 版本标签：必填，保留 latest 作为默认
      image_tag:
        description: '2. [必填] 镜像 Tag 版本'
        required: true
        default: 'latest'

      # 3. HF 仓库地址：必填，默认值为你的账号名
      hf_repo:
        description: '3. [必填] Hugging Face 目标仓库'
        required: true
        default: 'jiangyun007'

      # 4. HF 存放路径：必填，无默认值
      hf_base_dir:
        description: '4. [必填] 仓库下的分类目录路径 (例: docker-images)'
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Pull and Compress
        run: |
          sudo apt-get update && sudo apt-get install -y zstd
          
          RAW_IMAGE="${{ github.event.inputs.docker_image }}"
          TAG="${{ github.event.inputs.image_tag }}"
          
          # 【安全处理】将原始镜像名中的斜杠 '/' 替换为下划线 '_'
          SAFE_NAME=$(echo $RAW_IMAGE | tr '/' '_')
          
          echo "==== 开始拉取镜像: $RAW_IMAGE:$TAG ===="
          docker pull $RAW_IMAGE:$TAG
          
          echo "==== 开始打包与压缩 ===="
          docker save $RAW_IMAGE:$TAG -o $SAFE_NAME.tar
          zstd -T0 $SAFE_NAME.tar -o $SAFE_NAME.tar.zst
          rm $SAFE_NAME.tar

      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -U "huggingface_hub[cli]"
          
          # 读取传入的变量
          RAW_IMAGE="${{ github.event.inputs.docker_image }}"
          HF_REPO="${{ github.event.inputs.hf_repo }}"
          BASE_DIR="${{ github.event.inputs.hf_base_dir }}"
          
          SAFE_NAME=$(echo $RAW_IMAGE | tr '/' '_')
          FILENAME="$SAFE_NAME.tar.zst"
          
          # 清理路径末尾可能多余的斜杠，拼接最终路径
          BASE_DIR=$(echo "$BASE_DIR" | sed 's:/*$::')
          TARGET_PATH="$BASE_DIR/$SAFE_NAME/$FILENAME"
          
          echo "==== 准备就绪 ===="
          echo "上传至仓库: $HF_REPO"
          echo "最终存储路径为: $TARGET_PATH"
          
          # 执行上传
          hf upload $HF_REPO $FILENAME $TARGET_PATH --repo-type dataset