name: Docker to HuggingFace Sync

on:
  workflow_dispatch: # 支持手动点击运行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 腾出磁盘空间（这步对大镜像至关重要）
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # 2. 从 Docker Hub 拉取镜像
      - name: Pull Docker Image
        run: docker pull rosettacommons/foundry:latest

      # 3. 导出并使用 zstd 压缩
      # zstd 压缩率远高于 gzip，且速度极快，适合处理 GB 级的镜像包
      - name: Export and Compress
        run: |
          sudo apt-get update && sudo apt-get install -y zstd
          echo "Exporting image..."
          docker save rosettacommons/foundry:latest -o foundry.tar
          echo "Compressing with zstd..."
          zstd -T0 foundry.tar -o foundry.tar.zst
          rm foundry.tar

      # 4. 上传至 Hugging Face
      - name: Upload to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -U "huggingface_hub[cli]"
          # 请将下面的 <你的HF用户名> 替换为你真实的 HF ID
          # 仓库类型必须指定为 dataset
          huggingface-cli upload <jiangyun007>/docker-backups foundry.tar.zst foundry.tar.zst --repo-type dataset